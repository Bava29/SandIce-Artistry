<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SandIce Artistry</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Open+Sans:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/register.css">
</head>

<body>
    <main class="auth-page">
        <section class="auth-shell">
            <div class="auth-split">
                <div class="auth-panel auth-panel-art auth-panel-register">
                    <div class="auth-panel-overlay"></div>
                    <div class="auth-panel-content">
                        <div class="auth-panel-copy">
                            <span class="auth-eyebrow">Sand & Ice Experiences</span>
                            <h1>Create your SandIce account</h1>
                            <p>
                                Register to manage bookings, request custom sculptures, and stay updated with our
                                newest creations.
                            </p>
                        </div>
                    </div>
                </div>

                <div class="auth-panel auth-panel-form">
                    <div class="auth-card">
                        <a href="index.html" class="auth-form-logo">
                            <img src="images/logo.png" alt="SandIce Logo">
                        </a>

                        <h2>Create Account</h2>
                        <p class="auth-subtext">Please register to continue</p>

                        <form class="auth-form">
                            <div class="auth-grid">
                                <div class="auth-field">
                                    <label for="registerFirstName">First Name</label>
                                    <input type="text" id="registerFirstName" name="firstName" placeholder="First name"
                                        required>
                                </div>

                                <div class="auth-field">
                                    <label for="registerLastName">Last Name</label>
                                    <input type="text" id="registerLastName" name="lastName" placeholder="Last name"
                                        required>
                                </div>
                            </div>

                            <div class="auth-field">
                                <label for="registerEmail">Email Address</label>
                                <input type="email" id="registerEmail" name="email" placeholder="Enter your email"
                                    required>
                            </div>

                            <div class="auth-grid">
                                <div class="auth-field">
                                    <label for="registerPassword">Password</label>
                                    <div class="password-field">
                                        <input type="password" id="registerPassword" name="password"
                                            placeholder="Create password" required>
                                        <button type="button" class="toggle-password" aria-label="Show password">
                                            <i class="fa-solid fa-eye"></i>
                                        </button>
                                    </div>
                                </div>

                                <div class="auth-field">
                                    <label for="registerConfirmPassword">Confirm Password</label>
                                    <div class="password-field">
                                        <input type="password" id="registerConfirmPassword" name="confirmPassword"
                                            placeholder="Confirm password" required>
                                        <button type="button" class="toggle-password" aria-label="Show password">
                                            <i class="fa-solid fa-eye"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <div class="auth-options">
                                <label class="remember-me">
                                    <input type="checkbox" name="terms" required>
                                    <span>I agree to the terms and privacy policy</span>
                                </label>
                            </div>

                            <button type="submit" class="btn btn-primary auth-submit">Create Account</button>
                        </form>

                        <div class="auth-socials">
                            <a href="#" aria-label="Register with Google"><i class="fa-brands fa-google"></i></a>
                            <a href="#" aria-label="Register with Facebook"><i class="fa-brands fa-facebook-f"></i></a>
                            <a href="#" aria-label="Register with Apple"><i class="fa-brands fa-apple"></i></a>
                        </div>

                        <p class="auth-switch">
                            Already a user?
                            <a href="login.html">Login</a>
                        </p>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>

<script src="js/main.js"></script>

</html>
